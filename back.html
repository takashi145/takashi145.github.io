<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Takashi145-Github-Pages</title>

  <script src="https://kit.fontawesome.com/e42ad1ba6a.js" crossorigin="anonymous"></script>

  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">

  <!-- スタイルシート -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/smartphone.css">
  <link rel="stylesheet" href="/css/profile.css">
  <link rel="stylesheet" href="/css/links.css">
</head>
<body>
  <div class="sumaho">
    <!-- スマホのトップバー (カメラなどがあるところ) -->
    <div class="top-bar"></div>

    <!-- スマホのスクリーン -->
    <div class="screen-content">
      <!-- 各セクションを格納 -->
      <div class="section-container">
        <!-- プロフィール -->
        <section id="profile" class="sections">
          <img src="https://avatars.githubusercontent.com/u/84027833?v=4" alt="takashi145" class="profile-icon">
          <div class="profile-details">
            <h2>takashi145</h2>
            <p>学生です！</p>
          </div>

          <!-- タイムライン -->
          <ol class="profile-timeline">
          </ol>
        </section>
      </div>
      
      <!-- ボトムナビゲーション -->
      <nav class="bottom-navbar">
        <a href="#profile">
          <i class="fa-regular fa-user"></i>
        </a>
        <a href="#links">
          <i class="fa-solid fa-link"></i>
        </a>
      </nav>
    </div>
  </div>
</body>

<script type="module">
  import data from "./data.json" assert { type: "json" };

  // タイムライン表示
  let timeline = document.querySelector('.profile-timeline');
  data.timeline.forEach(item => {
    let timelineItem = document.createElement('li');
    timelineItem.className = 'timeline-item';

    let timelinePoint = document.createElement('div');
    timelinePoint.className = 'timeline-point';

    timelineItem.appendChild(timelinePoint);

    timelineItem.appendChild(document.createTextNode(item.event));

    timeline.appendChild(timelineItem);
  });

  // リンクの表示
  let sections = document.querySelector('.section-container');
  let linkSection;
  data.links.forEach((link, index) => {
    if (index === 0 || index % 15  === 0) {
      linkSection = document.createElement('section');
      linkSection.className = 'links sections';
    }

    let linkItem = document.createElement('div');
    linkItem.className = 'link-item';

    let linkUrl = document.createElement('a');
    linkUrl.href = link.url;

    let iconDiv = document.createElement('div');
    iconDiv.className = 'link-icon';

    let icon = document.createElement('i');
    icon.className = link.icon;

    iconDiv.appendChild(icon);

    linkUrl.appendChild(iconDiv);

    let linkName = document.createElement('h2');
    linkName.className = 'link-name';
    linkName.innerText = link.name;

    linkUrl.appendChild(linkName);

    linkItem.appendChild(linkUrl);

    linkSection.appendChild(linkItem);

    sections.appendChild(linkSection);
  });
</script>
</html>
